        <div> class = "title">calculator</div>

        <div class="grid">
            <input id = "result" type="text" placeholder="result"readonly>
            <button class ="btn op"onclick="set screenvalue('+')">+

            </button>

            onclick="setscreenvalue(1)">1</button>

            <button class="btn" onclick="setscreenvalue(3)">3</button>

                    onclick="setscreenvalue('/')"></button>

            </button>
